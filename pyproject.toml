[build-system]
requires = [
    "setuptools >= 80",
    "setuptools_scm[toml] >= 8"
]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
# Presence of this section activates setuptools_scm, even though it's empty
write_to = "scgallery/_version.py"
write_to_template = '''
# This file is automatically generated by setuptools_scm.
# Do not edit it directly.

__version__ = "{version}"
__base_version__ = "{scm_version.tag}"
'''

[tool.setuptools]
include-package-data = true
packages = [
    "scgallery"
]

[project]
name = "sc-gallery"
authors = [
    {name = "Peter Gadfort", email = "gadfort@zeroasic.com"},
]
description = "Design gallery for SiliconCompiler"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
    "siliconcompiler>=0.37.3",
    "lambdapdk>=0.2.11",
    "lambdalib>=0.12.0"
]
dynamic = ["version"]

[project.optional-dependencies]
# Dev dependencies.
dev = [
    "pytest==8.4.2",
    "pytest-xdist==3.8.0",
    "pytest-cov == 7.1.0"
]
lint = [
    "flake8==7.3.0",
    "tclint==0.7.0",
    "codespell==2.4.2"
]
docs = [
    "sphinx==8.2.3",
    "sphinx-rtd-theme==3.1.0"
]

[project.urls]
"Homepage" = "https://github.com/siliconcompiler/scgallery"
"Bug Tracker" = "https://github.com/siliconcompiler/scgallery/issues"

[project.scripts]
sc-gallery = "scgallery.apps.sc_gallery:main"

[tool.pytest.ini_options]
markers = [
    "eda: this test requires EDA tools installed to run."
]
testpaths = "tests"

[tool.tclint]
exclude = [
    '.venv/',
    'build/'
]

[tool.tclint.style]
line-length = 100

[tool.check-wheel-contents]
ignore = [
    "W002"
]

[tool.codespell]
skip = './build,./scgallery/designs/*/build,*.json,./scgallery/designs/*/src/*.v,./scgallery/designs/*/extra/*.v,./scgallery/designs/*/extra/*.sv,./scgallery/designs/swerv/config/common_defines.vh'
count = true
quiet-level = 3
